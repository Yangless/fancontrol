name: test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  powershell-tests:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -RequiredVersion 4.10.1 -Force -SkipPublisherCheck

      - name: Run test suite
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 4.10.1 -Force
          ./tests/Invoke-FanControlTests.ps1
